<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Reader - プレビュー</title>
    <link rel="stylesheet" href="styles.css">
    <!-- highlight.js CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>Markdown Reader</h1>
            <div class="controls">
                <button id="toggle-sidebar-btn" class="btn secondary" style="padding: 0.5rem; display: flex; align-items: center; justify-content: center;" title="ファイル一覧の開閉">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="font-size-controls" style="display: flex; align-items: center; border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; height: 36px; margin-right: 4px;">
                    <button id="font-decrease-btn" class="btn secondary" style="border-radius: 0; border: none; height: 100%; padding: 0 0.5rem;" title="文字を小さく">-</button>
                    <span id="font-size-display" style="padding: 0 0.5rem; font-size: 0.875rem; background: var(--secondary-bg); border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color); height: 100%; display: flex; align-items: center; justify-content: center; min-width: 3rem;">16px</span>
                    <button id="font-increase-btn" class="btn secondary" style="border-radius: 0; border: none; height: 100%; padding: 0 0.5rem;" title="文字を大きく">+</button>
                </div>
                <button id="edit-mode-btn" class="btn secondary hidden">編集</button>
                <button id="preview-mode-btn" class="btn secondary hidden">プレビュー</button>
                <input type="file" id="file-input" accept=".md" multiple hidden>
                <input type="file" id="folder-input" webkitdirectory hidden>
                <button id="select-btn" class="btn primary">ファイル追加</button>
                <button id="folder-btn" class="btn secondary">フォルダ追加</button>
            </div>
        </header>

        <div class="main-layout">
            <aside class="sidebar hidden" id="sidebar">
                <div class="sidebar-header">
                    <h2>ファイル一覧</h2>
                </div>
                <ul id="file-list" class="file-list">
                    <!-- ファイルリストがここに挿入されます -->
                </ul>
            </aside>

        <main class="viewer-container">
            <div id="drop-zone" class="drop-zone">
                <div class="drop-message">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="12" y1="18" x2="12" y2="12"></line>
                        <polyline points="9 15 12 12 15 15"></polyline>
                    </svg>
                    <p>ここにMarkdownファイルをドロップ</p>
                </div>
            </div>

            <div id="editor-container" class="editor-container hidden">
                <div class="editor-toolbar">
                    <button id="btn-bold" class="btn secondary" title="太字"><strong>B</strong></button>
                    <button id="btn-h1" class="btn secondary" title="見出し1">H1</button>
                    <button id="btn-h2" class="btn secondary" title="見出し2">H2</button>
                    <button id="btn-table" class="btn secondary" title="表の挿入">Table</button>
                    <div class="spacer"></div>
                    <button id="btn-save" class="btn primary" title="保存">保存</button>
                </div>
                <textarea id="markdown-editor" class="markdown-editor" placeholder="Markdownを入力してください..."></textarea>
            </div>

            <article id="markdown-body" class="markdown-body hidden">
                <!-- 変換されたMarkdownがここに挿入されます -->
            </article>
        </main>
        </div>

        <footer class="app-footer">
            <p>&copy; 2026 Markdown Reader</p>
        </footer>
    </div>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
